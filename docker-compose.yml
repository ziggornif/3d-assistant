version: '3.8'

services:
  db:
    image: postgres:18-alpine
    container_name: quote-service-db
    environment:
      POSTGRES_USER: quote_service
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-quote_secret_2025}
      POSTGRES_DB: quotes
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quote_service -d quotes"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: quote-service-app
    ports:
      - "3000:3000"
    environment:
      - HOST=0.0.0.0
      - PORT=3000
      - DATABASE_URL=postgres://quote_service:${POSTGRES_PASSWORD:-quote_secret_2025}@db:5432/quotes
      - UPLOAD_DIR=/app/uploads
      - STATIC_DIR=/app/static
      - TEMPLATE_DIR=/app/templates
      - MAX_FILE_SIZE_MB=50
      - SESSION_EXPIRY_HOURS=24
      - ADMIN_TOKEN=${ADMIN_TOKEN:-admin-secret-token-2025}
      - RUST_LOG=info
    volumes:
      - app_uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 15s

volumes:
  postgres_data:
    driver: local
  app_uploads:
    driver: local
